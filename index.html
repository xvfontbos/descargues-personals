<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XVI Downloader</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <style>
    :root {
      --bg-main: #1a1a1a;
      --bg-toolbar: #111111;
      --text-main: #e0d8cc;
      --text-muted: #777777;
      --accent: #c8a97e;
      --border: #333333;
      --font-serif: Georgia, serif;
      --font-sans: sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-serif);
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #toolbar {
      background: var(--bg-toolbar);
      padding: 10px 15px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #app-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-family: var(--font-sans);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 8px;
      font-weight: normal;
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-sans);
      margin-bottom: 30px;
    }
    .search-box {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      background: #000;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 12px;
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .btn {
      height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 20px;
      font-size: 0.85rem;
      font-family: var(--font-sans);
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent); color: #000; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .options-row {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      color: var(--text-muted);
      align-items: center;
    }
    select {
      background: #000;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 4px;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }
    .loader {
      border: 2px solid #333;
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #result-area {
      width: 100%;
      max-width: 600px;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: none;
      text-align: center;
    }
    #result-area p {
      margin-bottom: 15px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }
    #error-area {
      width: 100%;
      max-width: 600px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 8px;
      padding: 15px 20px;
      display: none;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: #e08080;
    }
    .platforms {
      margin-top: 30px;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header id="toolbar">
    <span id="app-title">XVI Downloader</span>
  </header>

  <main id="main-container">
    <h1>Descarregar Vídeo</h1>
    <p class="subtitle">YouTube · Vimeo · Twitter/X · Instagram · TikTok · i més</p>

    <div class="search-box">
      <input type="text" id="video-url" placeholder="Enganxa l'enllaç aquí..." autofocus>
      <button class="btn" id="dl-btn" onclick="fetchVideo()">Cercar</button>
    </div>

    <div class="options-row">
      <span>Qualitat:</span>
      <select id="quality">
        <option value="1080">1080p</option>
        <option value="720" selected>720p</option>
        <option value="480">480p</option>
        <option value="360">360p</option>
      </select>
      <span style="margin-left:10px">Format:</span>
      <select id="vcodec">
        <option value="h264" selected>H.264 (mp4)</option>
        <option value="vp9">VP9 (webm)</option>
        <option value="av1">AV1</option>
      </select>
    </div>

    <div id="loader" class="loader"></div>
    <div id="error-area"></div>

    <div id="result-area">
      <p id="result-msg">Vídeo trobat.</p>
      <a id="download-link" href="#" class="btn" target="_blank" rel="noopener">
        ⬇ Baixar Vídeo
      </a>
    </div>

    <div class="platforms">
      Funciona amb cobalt.tools · Servei obert i sense publicitat
    </div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    document.getElementById('video-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchVideo();
    });

    async function fetchVideo() {
      const urlInput = document.getElementById('video-url').value.trim();
      const quality  = document.getElementById('quality').value;
      const vcodec   = document.getElementById('vcodec').value;
      const btn      = document.getElementById('dl-btn');
      const loader   = document.getElementById('loader');
      const resultArea = document.getElementById('result-area');
      const errorArea  = document.getElementById('error-area');

      if (!urlInput) { alert("Si us plau, posa un enllaç."); return; }

      btn.disabled = true;
      loader.style.display = 'block';
      resultArea.style.display = 'none';
      errorArea.style.display = 'none';

      try {
        // Hem corregit els noms dels paràmetres (videoCodec i videoQuality)
        const response = await fetch('https://api.cobalt.tools/api/json', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            url: urlInput,
            videoCodec: vcodec,
            videoQuality: quality,
            isAudioOnly: false,
            disableMetadata: false
          })
        });

        // Si la resposta no és OK, és que hi ha un problema de CORS o de l'API
        if (!response.ok) {
            throw new Error(`L'API ha respost amb error ${response.status}. Possible bloqueig de CORS.`);
        }

        const data = await response.json();

        loader.style.display = 'none';
        btn.disabled = false;

        if (data.status === 'stream' || data.status === 'redirect' || data.status === 'tunnel') {
          resultArea.style.display = 'block';
          const link = document.getElementById('download-link');
          link.href = data.url;
          // IMPORTANT: El navegador sol bloquejar el 'download' forçat des de dominis externs
          // per això fem servir target="_blank" per seguretat.
          document.getElementById('result-msg').textContent =
            `Vídeo llest · Qualitat: ${quality}p · ${vcodec.toUpperCase()}`;
        } else if (data.status === 'picker') {
          resultArea.style.display = 'block';
          document.getElementById('result-msg').textContent =
            `S'han trobat diversos fitxers. Es baixarà el primer.`;
          const link = document.getElementById('download-link');
          link.href = data.picker[0].url;
        } else {
          throw new Error(data.text || 'No s\'ha pogut processar l\'enllaç.');
        }

      } catch (err) {
        loader.style.display = 'none';
        btn.disabled = false;
        errorArea.style.display = 'block';
        
        // Missatge amigable per a l'usuari sobre el CORS
        if (err.message.includes('fetch') || err.message.includes('CORS')) {
            errorArea.innerHTML = "<strong>Error de connexió (CORS):</strong> L'API de Cobalt no permet peticions directes des del navegador a GitHub Pages. <br><small>Prova de fer-ho servir en local o des d'una altra instància.</small>";
        } else {
            errorArea.textContent = `Error: ${err.message}`;
        }
      }
    }
  </script>
</body>
</html>
