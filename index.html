<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XVI · Descarregador</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e0d0;
      --muted:    #666;
      --accent:   #c8a97e;
      --accent2:  #8aab8a;
      --danger:   #b05050;
      --serif:    Georgia, 'Times New Roman', serif;
      --sans:     'Helvetica Neue', Helvetica, Arial, sans-serif;
      --radius:   6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 6px;
      flex-shrink: 0;
    }

    .nav-title {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: auto;
    }

    .nav-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .nav-icon:hover { opacity: 0.8; }
    .nav-icon.active { opacity: 1; }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 40px;
    }

    .wordmark {
      font-size: 0.65rem;
      font-family: var(--sans);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .sub {
      font-size: 0.78rem;
      font-family: var(--sans);
      color: var(--muted);
      margin-bottom: 36px;
      text-align: center;
    }

    /* ── INPUT ── */
    .input-wrap {
      width: 100%;
      max-width: 620px;
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 16px;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 22px;
      height: 46px;
      font-family: var(--sans);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
    }
    .btn:hover:not(:disabled) { background: var(--accent); color: #000; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.secondary {
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .btn.secondary:hover:not(:disabled) { background: var(--accent2); color: #000; }

    /* ── OPTIONS ── */
    .opts {
      width: 100%;
      max-width: 620px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    select {
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.78rem;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }

    /* ── LOADER ── */
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULT / ERROR ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: none;
      margin-top: 4px;
    }

    .card.error { border-color: var(--danger); background: #1a0e0e; }

    .card-title {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-msg {
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .card-msg.err { color: #d07070; font-family: var(--sans); font-size: 0.82rem; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── PICKER (múltiples fitxers) ── */
    .picker-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    .picker-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 0.82rem;
    }
    .picker-list img {
      width: 80px; height: 50px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    /* ── ALTERNATIVA MANUAL ── */
    .alt-section {
      width: 100%;
      max-width: 620px;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
      display: none;
    }
    .alt-title {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .alt-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .alt-link {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: var(--radius);
      transition: all 0.18s;
    }
    .alt-link:hover { border-color: var(--accent); background: var(--accent); color: #000; }

    /* ── FOOTER ── */
    footer {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <span class="nav-title">XVI · Biblioteca</span>

  <!-- Icona llibre -->
  <img class="nav-icon" title="Lector ePub" src="llibre_blanc.svg"
       onclick="window.location.href='epub.html'">

  <!-- Icona auriculars -->
  <img class="nav-icon" title="Ràdio" src="auriculars_blanc.svg"
       onclick="window.location.href='radio.html'">

  <!-- Icona vídeo (activa) -->
  <img class="nav-icon active" title="Descarregador" src="video_blanc.svg">
</nav>

<main>
  <p class="wordmark">XVI · Descarregador</p>
  <h1>Baixar vídeo</h1>
  <p class="sub">Enganxa qualsevol URL · S'intenta amb cobalt.tools i altres mètodes</p>

  <div class="input-wrap">
    <input type="text" id="url-input"
           placeholder="https://spankbang.com/… · xfantazy.com/… · vimeo.com/…">
    <button class="btn" id="go-btn" onclick="startDownload()">Cercar</button>
  </div>

  <div class="opts">
    <span>Qualitat:</span>
    <select id="quality">
      <option value="max">Màxima</option>
      <option value="1080">1080p</option>
      <option value="720" selected>720p</option>
      <option value="480">480p</option>
    </select>
    <label>
      <input type="checkbox" id="audio-only"> Només àudio
    </label>
    <label>
      <input type="checkbox" id="mute-audio"> Sense àudio
    </label>
  </div>

  <div class="spinner" id="spinner"></div>

  <!-- Resultat OK -->
  <div class="card" id="ok-card">
    <p class="card-title">Vídeo trobat</p>
    <p class="card-msg" id="ok-msg"></p>
    <div class="btn-row" id="ok-btns"></div>
  </div>

  <!-- Resultat error -->
  <div class="card error" id="err-card">
    <p class="card-title">No s'ha pogut processar</p>
    <p class="card-msg err" id="err-msg"></p>
    <div class="btn-row" id="err-btns"></div>
  </div>

  <!-- Alternatives manuals -->
  <div class="alt-section" id="alt-section">
    <p class="alt-title">Prova manualment</p>
    <div class="alt-links" id="alt-links"></div>
  </div>
</main>

<footer>
  Usa cobalt.tools · Codi obert · Sense publicitat
</footer>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startDownload();
});

function ui(loading) {
  document.getElementById('go-btn').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
  document.getElementById('ok-card').style.display = 'none';
  document.getElementById('err-card').style.display = 'none';
  document.getElementById('alt-section').style.display = 'none';
}

function showOk(msg, links) {
  const card = document.getElementById('ok-card');
  document.getElementById('ok-msg').textContent = msg;
  const btns = document.getElementById('ok-btns');
  btns.innerHTML = '';
  links.forEach(l => {
    const a = document.createElement('a');
    a.href = l.url;
    a.className = 'btn' + (l.secondary ? ' secondary' : '');
    a.textContent = l.label;
    a.target = '_blank';
    a.rel = 'noopener';
    if (l.download) a.setAttribute('download', '');
    btns.appendChild(a);
  });
  card.style.display = 'block';
}

function showErr(msg, url) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-card').style.display = 'block';

  // Alternatius manuals
  const alts = [
    { label: 'cobalt.tools', href: `https://cobalt.tools/?u=${encodeURIComponent(url)}` },
    { label: 'savefrom.net', href: `https://en.savefrom.net/#url=${encodeURIComponent(url)}` },
    { label: 'yt1s.com', href: `https://www.yt1s.com/en/youtube-to-mp4?q=${encodeURIComponent(url)}` },
  ];
  const section = document.getElementById('alt-section');
  const linksDiv = document.getElementById('alt-links');
  linksDiv.innerHTML = '';
  alts.forEach(a => {
    const el = document.createElement('a');
    el.href = a.href;
    el.className = 'alt-link';
    el.textContent = a.label;
    el.target = '_blank';
    el.rel = 'noopener';
    linksDiv.appendChild(el);
  });
  section.style.display = 'block';
}

async function startDownload() {
  const url     = document.getElementById('url-input').value.trim();
  const quality = document.getElementById('quality').value;
  const audioOnly = document.getElementById('audio-only').checked;
  const muteAudio = document.getElementById('mute-audio').checked;

  if (!url) { alert('Si us plau, enganxa un enllaç.'); return; }

  ui(true);

  try {
    // ── Intent 1: cobalt.tools (API v7) ──
    const body = {
      url,
      videoQuality: quality === 'max' ? '9000' : quality,
      audioFormat: 'mp3',
      isAudioOnly: audioOnly,
      isNoTTWatermark: true,
      isTTFullAudio: false,
    };
    if (muteAudio) body.isAudioMuted = true;

    const resp = await fetch('https://api.cobalt.tools/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    ui(false);

    if (data.status === 'tunnel' || data.status === 'redirect' || data.status === 'stream') {
      showOk(
        `Vídeo llest · ${quality === 'max' ? 'Màxima qualitat' : quality + 'p'}`,
        [
          { url: data.url, label: '⬇ Baixar', download: true },
          { url: data.url, label: '▶ Obrir', secondary: true }
        ]
      );

    } else if (data.status === 'picker') {
      const items = data.picker || [];
      showOk(
        `S'han trobat ${items.length} fitxer${items.length > 1 ? 's' : ''}.`,
        items.slice(0, 6).map((it, i) => ({
          url: it.url,
          label: `⬇ Fitxer ${i + 1}`,
          download: true,
          secondary: i > 0
        }))
      );

    } else {
      throw new Error(data.error?.code || data.text || 'El site no és compatible amb cobalt.');
    }

  } catch (err) {
    ui(false);
    showErr(
      `${err.message} · Prova un dels serveis alternatius.`,
      url
    );
  }
}
</script>
</body>
</html>
